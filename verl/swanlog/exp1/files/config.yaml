FRAMEWORK:
  desc: ''
  sort: 0
  value: verl
actor_rollout_ref:
  desc: ''
  sort: 1
  value:
    actor:
      checkpoint:
        load_contents:
        - model
        - optimizer
        - extra
        save_contents:
        - model
        - optimizer
        - extra
      clip_ratio: 0.2
      clip_ratio_c: 3.0
      clip_ratio_high: 0.2
      clip_ratio_low: 0.2
      entropy_checkpointing: 0
      entropy_coeff: 0.0
      entropy_from_logits_with_chunking: 0
      fsdp_config:
        forward_prefetch: 0
        fsdp_size: -1
        offload_policy: 0
        optimizer_offload: 0
        param_offload: 0
        reshard_after_forward: 1
        wrap_policy:
          min_num_params: 0
      grad_clip: 1.0
      kl_loss_coef: 0.0
      kl_loss_type: low_var_kl
      loss_agg_mode: token-mean
      optim:
        lr: 1.0e-06
        lr_warmup_steps: -1
        lr_warmup_steps_ratio: 0.0
        min_lr_ratio: 0.0
        num_cycles: 0.5
        total_training_steps: 312
        warmup_style: constant
        weight_decay: 0.01
      policy_loss:
        clip_cov_lb: 1.0
        clip_cov_ratio: 0.0002
        clip_cov_ub: 5.0
        kl_cov_ratio: 0.0002
        loss_mode: vanilla
        ppo_kl_coef: 0.1
      ppo_epochs: 1
      ppo_max_token_len_per_gpu: 16384
      ppo_micro_batch_size: null
      ppo_micro_batch_size_per_gpu: 1
      ppo_mini_batch_size: 64
      shuffle: 0
      strategy: fsdp
      ulysses_sequence_parallel_size: 1
      use_dynamic_bsz: 0
      use_kl_loss: 1
      use_torch_compile: 1
    hybrid_engine: 1
    model:
      custom_chat_template: null
      enable_activation_offload: 0
      enable_gradient_checkpointing: 1
      exclude_modules: null
      external_lib: null
      fused_kernel_options:
        impl_backend: torch
      lora_alpha: 16
      lora_rank: 0
      override_config: {}
      path: /root/paddlejob/workspace/env_run/models/Qwen2.5-14B
      target_modules: all-linear
      trust_remote_code: 0
      use_fused_kernels: 0
      use_liger: 0
      use_remove_padding: 1
      use_shm: 0
    profiler:
      _target_: verl.utils.profiler.ProfilerConfig
      all_ranks: 0
      discrete: 0
      ranks: []
    ref:
      entropy_checkpointing: 0
      entropy_from_logits_with_chunking: 0
      fsdp_config:
        forward_prefetch: 0
        param_offload: 1
        reshard_after_forward: 1
        wrap_policy:
          min_num_params: 0
      log_prob_max_token_len_per_gpu: 16384
      log_prob_micro_batch_size: null
      log_prob_micro_batch_size_per_gpu: 1
      log_prob_use_dynamic_bsz: 0
      strategy: fsdp
      ulysses_sequence_parallel_size: 1
      use_torch_compile: 1
    rollout:
      agent:
        agent_loop_config_path: null
        custom_async_server:
          name: null
          path: null
        num_workers: 8
      calculate_log_probs: 0
      disable_log_stats: 1
      do_sample: 1
      dtype: bfloat16
      enable_chunked_prefill: 1
      enforce_eager: 1
      engine_kwargs:
        sglang:
          attention_backend: null
        vllm:
          disable_mm_preprocessor_cache: 0
          swap_space: null
      free_cache_engine: 1
      gpu_memory_utilization: 0.5
      ignore_eos: 0
      layered_summon: 0
      load_format: dummy_dtensor
      log_prob_max_token_len_per_gpu: 16384
      log_prob_micro_batch_size: null
      log_prob_micro_batch_size_per_gpu: 1
      log_prob_use_dynamic_bsz: 0
      max_model_len: null
      max_num_batched_tokens: 8192
      max_num_seqs: 1024
      mode: sync
      multi_stage_wake_up: 0
      multi_turn:
        completion_callback: null
        enable: 0
        format: hermes
        interaction_config_path: null
        max_assistant_turns: null
        max_parallel_calls: 1
        max_tool_response_length: 256
        max_user_turns: null
        tokenization_sanity_check_mode: strict
        tool_config_path: null
        tool_response_truncate_side: middle
        use_inference_chat_template: 0
      n: 8
      name: vllm
      prompt_length: 4096
      response_length: 2048
      temperature: 1.0
      tensor_model_parallel_size: 4
      top_k: -1
      top_p: 1
      trace:
        backend: null
        token2text: 0
      update_weights_bucket_megabytes: 512
      val_kwargs:
        do_sample: 0
        n: 1
        temperature: 0
        top_k: -1
        top_p: 1.0
algorithm:
  desc: ''
  sort: 7
  value:
    _target_: verl.trainer.config.AlgoConfig
    adv_estimator: grpo
    gamma: 1.0
    kl_ctrl:
      _target_: verl.trainer.config.KLControlConfig
      horizon: 10000
      kl_coef: 0.001
      target_kl: 0.1
      type: fixed
    kl_penalty: kl
    lam: 1.0
    norm_adv_by_std_in_grpo: 1
    pf_ppo:
      _target_: verl.trainer.config.PFPPOConfig
      reweight_method: pow
      weight_pow: 2.0
    use_kl_in_reward: 0
    use_pf_ppo: 0
critic:
  desc: ''
  sort: 4
  value:
    _target_: verl.trainer.config.FSDPCriticConfig
    checkpoint:
