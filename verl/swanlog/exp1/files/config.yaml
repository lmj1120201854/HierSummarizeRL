      tokenizer_path: /root/paddlejob/workspace/env_run/models/Qwen2.5-14B
      trust_remote_code: 0
      use_remove_padding: 0
      use_shm: 0
    optim:
      lr: 1.0e-05
      lr_warmup_steps_ratio: 0.0
      min_lr_ratio: null
      total_training_steps: 312
      warmup_style: constant
      weight_decay: 0.01
    ppo_epochs: 1
    ppo_max_token_len_per_gpu: 32768
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: null
    ppo_mini_batch_size: 64
    profiler:
      _target_: verl.utils.profiler.ProfilerConfig
      all_ranks: 0
      discrete: 0
      ranks: []
    rollout_n: 8
    shuffle: 0
    strategy: fsdp
    ulysses_sequence_parallel_size: 1
    use_dynamic_bsz: 0
